render_freq: 0
episode_num: 1
use_seed: false
save_freq: 15
need_plan: true
actor_source: adjust_bottle
actor_model_sweep: true
actor_model_repeat: 8
embodiment:
- aloha-agilex
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  supervised_light_intervention: false
  supervised_light_settings:
    - ambient_light: [0.5, 0.7, 0.3]
    - ambient_light: [0.3, 0.5, 0.6]
    - direction_lights: [[[0, 0.5, -1], [0.2, 0.3, 0.3]]]
    - direction_lights: [[[0, 0.5, -1], [0.6, 0.7, 0.6]]]
    - point_lights: [[[1, 0, 1.8], [0.9, 0.9, 0.9]], [[-1, 0, 1.8], [0.9, 0.9, 0.9]]]
    - point_lights: [[[1, 0, 1.8], [0.6, 0.7, 0.6]], [[-1, 0, 1.8], [0.6, 0.7, 0.6]]]
    - direction_lights: [[[0, 0.4, -1.1], [0.5, 0.5, 0.5]]]
    - direction_lights: [[[0.1, 0.5, -0.9], [0.5, 0.5, 0.5]]]
    - point_lights: [[[1, 0, 1.6], [1, 1, 1]], [[-1, 0, 1.6], [1, 1, 1]]]
    - point_lights: [[[1, 0, 2.0], [1, 1, 1]], [[-1, 0, 2.0], [1, 1, 1]]]
  crazy_random_light_rate: 0
camera:
  head_camera_type: Large_D435
  wrist_camera_type: Large_D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: true
  pointcloud: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: true
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 1
collect_data: true
eval_video_log: true
video_fps: 24
eval_video_fps: 10

num_of_interventions: 3

# config must be arranged in time order
intervention 0:
  type: move_waypoint
  phase: phase
  parameters:
    target_pose_cube:
      centre: [0.00, -0.15, 1.0]
      side_length: 0.15
      arm_tag: left
    target_pose_left: [0.0, -0.15, 1.0]
    target_pose_right: [0.0, -0.15, 1.0]
    left_gripper_angle: [-pi/6, pi/3, pi/8]
    right_gripper_angle: [-pi/6, pi/3, 2*pi/3]
    hold_steps: 50

intervention 1:
  type: gripper_perturbation
  phase: phase
  parameters:
    gripper_position: 0.0
  hold_steps: 50

intervention 2:
  type: gripper_perturbation
  phase: phase
  parameters:
    gripper_position: 1.0
  hold_steps: 50
