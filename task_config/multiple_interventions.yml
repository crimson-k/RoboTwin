render_freq: 0
episode_num: 1
use_seed: false
save_freq: 15
need_plan: true
embodiment:
- aloha-agilex
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: true
  pointcloud: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: true
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 1
collect_data: true
eval_video_log: true

num_of_interventions: 5

config must be arranged in time order
intervention 0:
  type: grasp_pose_perturbation  
  parameters:
    grasp_displacement: 0.05
    grasp_displacement_dim: 1
    grasp_gripper_opening: 0.05

intervention 1:
  type: trajectory_perturbation
  phase: after_first_grasp
  parameters:
    hold_steps: 50
    x_perturb : 0.02
    y_perturb : 0
    z_perturb : 0
    gripper_position: 0.7

intervention 2:
  type: move_waypoint
  phase: after_lift
  parameters:
    target_pose_left: [0.0, -0.18, 1.0]
    target_pose_right: [0.2, -0.2, 0.9]
    gripper_angle: [-pi/6, pi/3, pi/8]
    hold_steps: 50

intervention 3:
  type: move_waypoint
  phase: after_second_grasp
  parameters:
    target_pose_left: [0.05, -0.18, 1.0]
    target_pose_right: [0.05, -0.18, 1.0]
    gripper_angle: [pi/6, -pi/3, pi/8]
    hold_steps: 50

intervention 4:
  type: gripper_perturbation
  phase: after_handover
  parameters:
    gripper_position: 1.0
    hold_steps: 50
