render_freq: 0
episode_num: 1
use_seed: false
save_freq: 15
need_plan: true
embodiment:
- aloha-agilex
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: true
  pointcloud: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: true
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 1
collect_data: true
eval_video_log: true
video_fps: 30
eval_video_fps: 10
num_of_intervention_types: 1
intervention:
  type: move_waypoint
  parameters:
    num_of_waypoints: 2
    phase: [after_lift, after_lift]
    waypoint 0:
      target_pose_left: [0.1, -0.05, 1.00]
      target_pose_right: [0.1, 0.05, 1.00]
      gripper_angle: [pi/6, pi/8, pi/6]
    waypoint 1:
      target_pose_left: [0.05, -0.05, 1.00]
      target_pose_right: [0.1, 0.05, 1.00]
      gripper_angle: [pi/6, pi/8, pi/6]
  verification_steps: 50
